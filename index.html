<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PokeBattleDex</title>
    <link rel="icon" href="data:,">
    <script>
      tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://unpkg.com/pokeapi-js-wrapper@1.2.8/dist/index.js"></script>
    <script type="module" src="./js/main.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-950 antialiased transition-colors">
    <main class="min-h-screen px-4 py-6 sm:px-6 lg:px-8">
      <section class="mx-auto flex w-full max-w-7xl flex-col gap-6" style="max-width: min(80rem, calc(100vw - 2rem));" aria-labelledby="app-title">
        <header class="flex flex-col gap-4 rounded-2xl border border-slate-200 bg-white/85 p-5 shadow-sm backdrop-blur sm:flex-row sm:items-center sm:justify-between">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-red-600">Modo Pokedex</p>
            <h1 id="app-title" class="mt-2 break-words text-3xl font-black tracking-tight sm:text-5xl">PokeBattleDex</h1>
            <p class="mt-2 max-w-2xl break-words text-sm text-slate-600">Stats, habilidades y matchups defensivos.</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button id="theme-style-toggle" type="button" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">90s</button>
            <button id="dark-mode-toggle" type="button" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">Oscuro</button>
          </div>
        </header>

        <div class="grid gap-6 lg:grid-cols-[360px_minmax(0,1fr)]">
          <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm" aria-label="Busqueda de Pokemon">
            <label for="pokemon-search" class="text-sm font-bold text-slate-700">Buscar Pokemon</label>
            <div class="mt-3 grid gap-3 sm:grid-cols-[1fr_auto] lg:grid-cols-1">
              <input id="pokemon-search" class="w-full rounded-lg border border-slate-300 bg-white px-4 py-3 text-base outline-none transition placeholder:text-slate-400 focus:border-red-500 focus:ring-4 focus:ring-red-100" type="search" autocomplete="off" placeholder="pikachu, charizard, gengar">
              <button id="reload-cache" class="rounded-lg bg-red-600 px-4 py-3 text-sm font-bold text-white transition hover:bg-red-700" type="button">Recargar datos</button>
            </div>
            <label class="mt-4 flex items-center gap-3 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm font-bold text-slate-700">
              <input id="compare-toggle" class="h-4 w-4 accent-red-600" type="checkbox">
              Comparar
            </label>
            <div id="compare-search-panel" class="mt-4 hidden">
              <label for="pokemon-search-secondary" class="text-sm font-bold text-slate-700">Buscar segundo Pokemon</label>
              <input id="pokemon-search-secondary" class="mt-3 w-full rounded-lg border border-slate-300 bg-white px-4 py-3 text-base outline-none transition placeholder:text-slate-400 focus:border-red-500 focus:ring-4 focus:ring-red-100" type="search" autocomplete="off" placeholder="primarina, incineroar">
              <ul id="autocomplete-results-secondary" class="mt-4 max-h-60 min-h-32 overflow-auto rounded-xl border border-slate-200 bg-slate-50" aria-live="polite"></ul>
            </div>
            <ul id="autocomplete-results" class="mt-4 max-h-[420px] min-h-48 overflow-auto rounded-xl border border-slate-200 bg-slate-50" aria-live="polite"></ul>
            <p id="app-status" class="mt-4 min-h-6 text-sm font-semibold text-slate-500">Inicializando datos...</p>
          </section>

          <section id="profile-panel" class="min-h-[520px] rounded-2xl border border-slate-200 bg-white p-5 shadow-sm" aria-live="polite">
            <div class="grid min-h-[480px] place-items-center rounded-xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-slate-500">
              <p>Busca un Pokemon para ver stats, habilidades y matchups de tipos.</p>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
